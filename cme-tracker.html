<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CME Tracker - HealthCareer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Same sidebar as dashboard -->
        <aside class="sidebar">
            <!-- ... sidebar content ... -->
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>CME Tracker</h1>
                <button class="btn-primary" onclick="showAddForm()">
                    <i class="fas fa-plus"></i> Add Activity
                </button>
            </div>

            <!-- Summary Cards -->
            <div class="stats-grid">
                <div class="card">
                    <h3>Total Credits</h3>
                    <div class="stat-number" id="total-credits">0</div>
                </div>
                <div class="card">
                    <h3>This Year</h3>
                    <div class="stat-number" id="year-credits">0</div>
                </div>
                <div class="card">
                    <h3>Required</h3>
                    <div class="stat-number">50</div>
                </div>
                <div class="card">
                    <h3>License Renewal</h3>
                    <div class="stat-number" id="renewal-date">Dec 2024</div>
                </div>
            </div>

            <!-- Add Activity Form (Hidden by default) -->
            <div class="card" id="add-form" style="display: none;">
                <h3>Add CME Activity</h3>
                <form onsubmit="addCMEActivity(event); return false;">
                    <div class="form-group">
                        <label>Activity Title</label>
                        <input type="text" name="title" required>
                    </div>
                    <div class="form-group">
                        <label>Date Completed</label>
                        <input type="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label>Credits</label>
                        <input type="number" step="0.5" name="credits" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category">
                            <option value="AMA PRA Category 1">AMA PRA Category 1</option>
                            <option value="AAFP Prescribed">AAFP Prescribed</option>
                            <option value="Self-assessment">Self-assessment</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Provider</label>
                        <input type="text" name="provider">
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea name="notes" rows="3"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Save Activity</button>
                        <button type="button" class="btn-outline" onclick="hideAddForm()">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Activities List -->
            <div class="card">
                <div class="card-header">
                    <h3>Your CME Activities</h3>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search activities..." id="search-activities">
                    </div>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Date</th>
                                <th>Credits</th>
                                <th>Category</th>
                                <th>Provider</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="activities-list">
                            <!-- Filled by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        function showAddForm() {
            document.getElementById('add-form').style.display = 'block';
        }

        function hideAddForm() {
            document.getElementById('add-form').style.display = 'none';
        }

        async function loadCMEActivities() {
            const { data } = await supabaseClient.getCMEActivities();
            
            if (data) {
                const totalCredits = data.reduce((sum, act) => sum + act.credits, 0);
                const yearCredits = data
                    .filter(act => new Date(act.date_completed).getFullYear() === new Date().getFullYear())
                    .reduce((sum, act) => sum + act.credits, 0);
                
                document.getElementById('total-credits').textContent = totalCredits;
                document.getElementById('year-credits').textContent = yearCredits;
                
                const tbody = document.getElementById('activities-list');
                tbody.innerHTML = data.map(act => `
                    <tr>
                        <td>${act.title}</td>
                        <td>${utils.formatDate(act.date_completed)}</td>
                        <td>${act.credits}</td>
                        <td><span class="badge badge-success">${act.category || 'General'}</span></td>
                        <td>${act.provider || '-'}</td>
                        <td>
                            <button onclick="deleteActivity('${act.id}')" class="btn-icon">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function deleteActivity(id) {
            if (confirm('Are you sure you want to delete this activity?')) {
                const { error } = await supabaseClient.deleteCMEActivity(id);
                if (!error) {
                    utils.showToast('Activity deleted');
                    loadCMEActivities();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadCMEActivities();
            
            // Search functionality
            document.getElementById('search-activities').addEventListener('input', function(e) {
                const searchTerm = e.target.value.toLowerCase();
                const rows = document.querySelectorAll('#activities-list tr');
                
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(searchTerm) ? '' : 'none';
                });
            });
        });
    </script>
</body>
</html>
